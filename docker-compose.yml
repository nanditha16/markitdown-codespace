services:
  markitdown:
    build: .
    container_name: markitdown
    volumes:
      - ./:/app
      - ./input:/input
      - ./output:/output
      - hf-cache:/root/.cache/huggingface
      - /Users/nanditha/.config/gcloud:/root/.config/gcloud
      - /Users/nanditha/.markitdown-codespace:/root/.markitdown-codespace
    working_dir: /app
    tty: true
    ports:
      - "5001:5001"
      
volumes:
  hf-cache:
